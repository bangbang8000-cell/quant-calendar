    <script>
        // ===== Vue 应用初始化 =====
        console.log('[DEBUG] App init script starting');
        const { createApp, ref, computed, onMounted, onUnmounted, watch, nextTick } = Vue;
        console.log('[DEBUG] Vue destructured, creating app');
        const app = createApp({
            setup() {
                console.log('[DEBUG] setup() started');
                // ── 主题模块 ──
                const themeMod = window.__quantModules.themes.init();
                const { ICON_MAPS, iconSystem, switchIconSystem, researchMenuEnabled, toggleResearchMenu, themes, currentTheme, applyTheme, changeTheme } = themeMod;

                // ── 用户模块 ──
                const currentUser = ref(null);
                const loginForm = ref({ username: '', password: '' });
                const logining = ref(false);
                const guestLogining = ref(false);
                const showChangePassword = ref(false);
                const changePasswordForm = ref({ oldPassword: '', newPassword: '', confirmPassword: '' });
                const changingPassword = ref(false);
                const usersMod = window.__quantModules.users.init({ currentUser });
                const { userList, userSearch, groupFilter, userPageTab, expandedGroups, addMemberGroupMap, filteredUsers,
                    toggleGroupExpand, removeMemberFromGroupInline, addMemberToGroupInline, changeUserGroup,
                    showAddUser, editingUser, userForm, savingUser,
                    saveUser, deleteUser, toggleUserEnabled, resetUserPassword, editUser, loadUsers,
                    allGroups, loadAllGroups, getGroupName, getGroupMemberCount, getMenuEnabledCount, groupCount,
                    editingGroup, menuConfigDialog, memberDialog, groupEditForm, subPageCache, showAddGroup, addGroupForm, savingGroup,
                    groupMembers, addMemberUsername, selectedMemberGroup, subPageSectionExpanded,
                    toggleSubPageSection, openMemberManager, loadGroupMembers, addMemberToGroup, removeMemberFromGroup,
                    availableUsersForGroup, onParentToggle, allMenuDefs, openMenuConfig, saveMenuConfig, deleteGroupConfig, createGroup
                } = usersMod;

                // ── 系统模块 ──
                const sysMod = window.__quantModules.system.init({
                    aiConfig: null, currentTheme, changeTheme, iconSystem, researchMenuEnabled,
                    autoEvaluateConfig: null, strategyFilter: null, saveAiModels: null, autoEvaluateScope: null
                });
                const { feishuConfig, feishuTestStatus, feishuTestMessage,
                    testFeishuWebhook, saveFeishuConfig, loadFeishuConfig,
                    tushareConfig, tushareStatus, syncingData,
                    checkTushareConnection, testTushareConnection, syncStockData, loadTushareConfig,
                    datasourceConfig, datasourceStatus,
                    loadDatasourceConfig, saveDatasourceConfig, testDatasource,
                    rateLimitConfig, rateLimitDirty, rateLimitSaving, loadRateLimit, saveRateLimit,
                    dataRefreshConfig, dataRefreshReloading, dataRefreshSaving,
                    loadDataRefreshConfig, saveDataRefreshConfig, triggerDataReload,
                    configSaving, configChanged, globalConfigDirty, lastSavedTime,
                    exportConfig, importConfig,
                    stockCount, tradeDateCount, aiStatus, appVersion, showImportDialog,
                    loadSystemStatus, saveAllConfig, resetAllConfig
                } = sysMod;

                // ── 策略模块 ──
                const stratMod = window.__quantModules.strategies.init({});
                const { marketData, indexDetailVisible, indexDetail, indexAiResult, indexAiLoading,
                    klinePeriods, currentKlinePeriod, klineLoading, indexKlineLoading, stockKlineLoaded, indexKlineLoaded,
                    scoreAnimating, scoreDelta, scorePulse,
                    loadStockKline, switchKlinePeriod, loadIndexKline, switchIndexKlinePeriod, zoomKlineRange,
                    merrillData, stages, indicatorList, dimensionScoreList, confidenceColor,
                    timelineStages, getStageAngle, getCycleProgress, getCurrentStageMonths, getStageTotalMonths, isStageCompleted,
                    showMerrillDetail, merrillDetailData, showStageDetail, getCharLabel, getAssetName, getRankColor,
                    fetchMarketData, fetchMerrillClock,
                    showIndexDetail, loadCachedIndexEval, doIndexAiEvaluate,
                    merrillClockConfig, merrillClockLastUpdated, merrillReevalResult, merrillReevalLoading,
                    saveMerrillClockConfig, doMerrillReevaluate,
                    dashboardData, loadDashboardData, timeSinceRefresh
                } = stratMod;

                // ── AI模块 ──
                const aiMod = window.__quantModules.ai.init({
                    configChanged, stockDetail: null, stockDetailTab: null, stockDetailVisible: null,
                    stockKlineLoaded, currentKlinePeriod, selectedDate: null,
                    loadStockKline, refreshStockScore: null, animateScoreEntrance: null
                });
                const { aiLoading, aiEvalStage, showBatchEvaluate, batchStocks, batchRunning, batchTotal, batchCompleted, batchCurrent, batchStatuses, batchResults,
                    aiConfig, selectedPreset, providerInfo, applyPreset, onProviderChange,
                    aiResult, lastEvalTime, aiHistory, selectedHistoryIds, expandedDates, expandedMonths, expandedStocks, aiHistoryView,
                    selectedWatchlistCodes, showAutoEvaluateSettings, savingConfig, autoEvaluateScope, autoEvaluateConfig,
                    quickEvalStock, watchlistSort, watchlist, watchlistCodes, sortedWatchlist, evaluatedCodes, klineLoadedCodes, markKlineLoaded,
                    watchlistSearch, watchlistResults, watchlistSearching, preloadingKline,
                    getWatchlistScore, addSearchResult,
                    aiModels, aiModelsError, testingAllModels, savingAiModels,
                    loadAiModels, onModelToggle, testModel, testAllModels, saveAiModels, addModel, deleteModel,
                    doAiEvaluate, loadAiHistory, loadLastEvaluation, deleteSingleHistory,
                    toggleSelectHistory, clearSelection, clearWatchlistSelection, selectAllHistory, selectAllWatchlist, toggleSelectWatchlist,
                    toggleMonthExpand, toggleDateExpand, toggleStockExpand, toggleSelectDate, toggleSelectMonth, toggleSelectStock,
                    batchReevaluateHistory, batchAddToWatchlist, deleteSelectedHistory, batchRemoveWatchlist,
                    loadWatchlist, addToWatchlist, removeFromWatchlist, clearWatchlist, toggleWatchlist, searchStockForWatchlist,
                    showStockKline, preloadWatchlistKline, watchlistEvaluate, batchEvaluateWatchlist, batchEvaluateSelected,
                    groupedByDate, aiHistoryByStock, groupedByMonth, aiHistoryStockCount, scoreDistribution, quickEvaluate, viewAiResult, doBatchEvaluate,
                    loadAutoEvaluateConfig, saveAutoEvaluateConfig
                } = aiMod;

                // Now re-init system module with proper ai refs
                Object.assign(sysMod.init({
                    aiConfig, currentTheme, changeTheme, iconSystem, researchMenuEnabled,
                    autoEvaluateConfig, strategyFilter: null, saveAiModels, autoEvaluateScope
                }), {}); // not ideal but necessary

                // ── 日历模块 ──
                const calMod = window.__quantModules.calendar.init({
                    aiResult, klineLoadedCodes, stockKlineLoaded, currentKlinePeriod,
                    loadStockKline, refreshStockScore: null, animateScoreEntrance: null,
                    loadLastEvaluation, lastEvalTime
                });
                const calVars = calMod;
                let { views, currentView, statusFilter,
                    loading, loadingView, dates, selectedDate, lastLoadTime, consensus, searchKeyword,
                    stockDetailVisible, stockDetailTab, stockDetail, strategyList,
                    strategyFilter, strategyFilterOptions, strategyFilterCounts, expandedStrategies, strategyPreviewCount,
                    saveStrategyFilter, applyStrategyFilter,
                    statusCounts, stockPool, strategyDistribution,
                    viewUnit, datePickerType, dateFormat, canNavPrev, canNavNext,
                    switchView, navigateDate, disabledDate, onDateChange,
                    loadDates, refreshCalendarData, loadConsensusData, showStockDetail
                } = calVars;

                // Re-init ai module with calendar refs
                window.__quantModules.ai.init({
                    configChanged, stockDetail, stockDetailTab, stockDetailVisible,
                    stockKlineLoaded, currentKlinePeriod, selectedDate,
                    loadStockKline, refreshStockScore: null, animateScoreEntrance: null
                });

                const viewCache = new Map();

                // ===== v1.5.0: subPageNames =====
                const subPageNames = {
                    'overview': '概览', 'merrill': '美林时钟', 'market': '市场行情', 'consensus': '策略共识榜',
                    'daily': '日视图', 'weekly': '周视图', 'monthly': '月视图', 'yearly': '年视图', 'pool': '股票池',
                    'watchlist': '我的自选', 'history': '评估历史',
                    'quant-research': '量化研究', 'strategy-write': '策略编写', 'backtest': '策略回测', 'backtest-history': '回测记录',
                    'status': '系统状态', 'autoeval': '自动评股', 'datasource': '数据源', 'feature': '功能配置', 'user': '用户与权限', 'about': '关于'
                };

                // ===== v1.9.2: 用户组配置 =====
                const groupsConfig = ref(null);
                const menus = computed(() => {
                    const role = currentUser.value?.role || 'guest';
                    const groupId = currentUser.value?.group || role;
                    const group = groupsConfig.value?.[groupId] || null;
                    const icons = ICON_MAPS[iconSystem.value] || ICON_MAPS.emoji;
                    let items = allMenuDefs.map(m => {
                        if (group && group.visible_menus && m.key in group.visible_menus) { if (!group.visible_menus[m.key]) return null; }
                        const item = { ...m, icon: icons[m.key] || m.icon };
                        if (group?.visible_sub_pages) { item.subPages = m.subPages.filter(sp => { const fullKey = m.key + '.' + sp; return group.visible_sub_pages[fullKey] !== false; }); }
                        if (m.key === 'system' && role === 'guest' && m.guestSubPages) { item.subPages = m.guestSubPages; }
                        return item;
                    }).filter(Boolean);
                    if (!researchMenuEnabled.value) { items = items.filter(m => m.key !== 'research'); }
                    return items;
                });

                async function loadGroupConfig() {
                    try {
                        const token = localStorage.getItem('quant_token');
                        if (!token) return;
                        const res = await fetch('/api/groups/my', { headers: { 'Authorization': 'Bearer ' + token } });
                        if (res.ok) { const data = await res.json(); groupsConfig.value = { [data.group_id]: data.group }; }
                    } catch(e) { console.warn('loadGroupConfig:', e); }
                }

                const currentPage = ref('strategies');
                const currentSubPage = ref('overview');
                const showUserMenu = ref(false);

                // v1.11: 策略总览增强
                const poolChangeBadge = computed(() => {
                    const changes = (dashboardData.value || {}).pool_changes || {};
                    const net = (changes.new_count || 0) - (changes.out_count || 0);
                    if (net > 0) return { dir: 'up', text: '↑' + net };
                    if (net < 0) return { dir: 'down', text: '↓' + Math.abs(net) };
                    return { dir: 'flat', text: '→0' };
                });
                const timeBarPercent = computed(() => {
                    const cov = (dashboardData.value || {}).time_coverage || {};
                    const start = new Date(cov.start_date), end = new Date(cov.end_date), now = new Date();
                    if (!start.getTime() || !end.getTime()) return 100;
                    if (now >= end) return 100; if (now <= start) return 0;
                    return Math.round((now - start) / (end - start) * 100);
                });
                function navigateToStrategyFilter(strategyName) {
                    strategyFilter.value.selected = [strategyName]; strategyFilter.value.mode = 'union';
                    localStorage.setItem('quant_strategy_filter_selected', JSON.stringify([strategyName]));
                    localStorage.setItem('quant_strategy_filter_mode', 'union');
                    currentPage.value = 'calendar'; currentSubPage.value = 'daily';
                }
                const filteredConsensusRank = computed(() => { const rank = (dashboardData.value || {}).consensus_rank || []; return applyStrategyFilter(rank); });
                const currentPoolSize = computed(() => { const dayStocks = consensus.value || strategyFilterCounts.value.day || []; return applyStrategyFilter(dayStocks).length; });
                const filteredStrategyCounts = computed(() => {
                    const raw = (dashboardData.value || {}).strategy_counts || [];
                    const dayStocks = consensus.value || strategyFilterCounts.value.day || [];
                    if (dayStocks.length === 0) return raw;
                    const filtered = applyStrategyFilter(dayStocks);
                    const counts = {};
                    filtered.forEach(s => { const names = s.strategy_names || s.strategies || []; names.forEach(n => { counts[n] = (counts[n] || 0) + 1; }); });
                    const total = filtered.length || 1;
                    return raw.map(item => { const chineseName = item.strategy_name || item.strategy_id; const cnt = counts[chineseName] || 0; return { ...item, count: cnt, percentage: Math.round(cnt / total * 1000) / 10 }; });
                });

                // ===== 登录登出 =====
                async function handleLogin() {
                    if (!loginForm.value.username || !loginForm.value.password) { ElementPlus.ElMessage.warning('请输入用户名和密码'); return; }
                    logining.value = true;
                    try {
                        const res = await fetch('/api/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(loginForm.value) });
                        const data = await res.json();
                        if (data.success) {
                            currentUser.value = data.user;
                            localStorage.setItem('quant_user', JSON.stringify(data.user));
                            localStorage.setItem('quant_token', data.data.access_token);
                            applyTheme(data.user.theme || 'tech-blue');
                            await loadUserConfig();
                            await loadDates();
                            await loadConsensusData();
                            ElementPlus.ElMessage.success('登录成功!');
                        } else { ElementPlus.ElMessage.error(data.message || '登录失败'); }
                    } catch (e) { ElementPlus.ElMessage.error('登录失败'); }
                    finally { logining.value = false; }
                }

                async function handleGuestLogin() {
                    guestLogining.value = true;
                    try {
                        const res = await fetch('/api/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username: 'guest', password: 'guest' }) });
                        const data = await res.json();
                        if (data.success) {
                            currentUser.value = data.user;
                            localStorage.setItem('quant_user', JSON.stringify(data.user));
                            localStorage.setItem('quant_token', data.data.access_token);
                            applyTheme(data.user.theme || 'tech-blue');
                            await loadUserConfig();
                            await loadDates();
                            await loadConsensusData();
                            ElementPlus.ElMessage.success('访客登录成功!');
                        } else { ElementPlus.ElMessage.error(data.message || '登录失败'); }
                    } catch (e) { ElementPlus.ElMessage.error('登录失败'); }
                    finally { guestLogining.value = false; }
                }

                function handleLogout() { currentUser.value = null; localStorage.removeItem('quant_user'); }

                async function doChangePassword() {
                    if (!changePasswordForm.value.oldPassword) { ElementPlus.ElMessage.warning('请输入当前密码'); return; }
                    if (!changePasswordForm.value.newPassword || changePasswordForm.value.newPassword.length < 6) { ElementPlus.ElMessage.warning('新密码至少6位'); return; }
                    if (changePasswordForm.value.newPassword !== changePasswordForm.value.confirmPassword) { ElementPlus.ElMessage.warning('两次输入的新密码不一致'); return; }
                    changingPassword.value = true;
                    try {
                        const token = localStorage.getItem('quant_token');
                        const res = await fetch('/api/auth/change-password', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token }, body: JSON.stringify({ old_password: changePasswordForm.value.oldPassword, new_password: changePasswordForm.value.newPassword }) });
                        const data = await res.json();
                        if (res.ok) { ElementPlus.ElMessage.success('密码修改成功，请重新登录'); showChangePassword.value = false; changePasswordForm.value = { oldPassword: '', newPassword: '', confirmPassword: '' }; handleLogout(); }
                        else { ElementPlus.ElMessage.error(data.detail || '修改失败'); }
                    } catch (e) { ElementPlus.ElMessage.error('修改失败，请检查网络连接'); }
                    finally { changingPassword.value = false; }
                }

                async function loadUserConfig() {
                    try {
                        const token = localStorage.getItem('quant_token');
                        const headers = token ? { 'Authorization': 'Bearer ' + token } : {};
                        const res = await fetch('/api/user/config', { headers });
                        const data = await res.json();
                        if (data.success && data.config) {
                            const c = data.config;
                            if (c.tushare) tushareConfig.value = { ...tushareConfig.value, ...c.tushare };
                            if (c.datasource && c.datasource.sources) {
                                datasourceConfig.value = {
                                    sxsc_tushare: { ...datasourceConfig.value.sxsc_tushare, ...(c.datasource.sources.sxsc_tushare || {}) },
                                    tushare: { ...datasourceConfig.value.tushare, ...(c.datasource.sources.tushare || {}) },
                                    akshare: { ...datasourceConfig.value.akshare, ...(c.datasource.sources.akshare || {}) }
                                };
                            }
                            if (c.feishu) feishuConfig.value = { ...feishuConfig.value, ...c.feishu };
                            if (c.ai) aiConfig.value = { ...aiConfig.value, ...c.ai };
                            if (c.rate_limit) rateLimitConfig.value = { ...rateLimitConfig.value, ...c.rate_limit };
                            if (c.theme) applyTheme(c.theme);
                            if (c.auto_evaluate) autoEvaluateConfig.value = { ...autoEvaluateConfig.value, ...c.auto_evaluate };
                            if (c.icon_system) { iconSystem.value = c.icon_system; localStorage.setItem('icon_system', c.icon_system); }
                            if (c.research_menu_enabled !== undefined) { researchMenuEnabled.value = c.research_menu_enabled; localStorage.setItem('research_menu_enabled', c.research_menu_enabled ? '1' : '0'); }
                        }
                    } catch (e) { console.warn('加载用户配置失败，使用本地缓存', e); }
                }

                // v1.9.2: 评分动画 stubs
                function refreshStockScore() {}
                function animateScoreEntrance() {}

                // ===== 监听变化 =====
                watch([currentView, statusFilter], (newVal, oldVal) => { if (newVal[0] !== oldVal[0]) { loadConsensusData(); } });

                watch(currentPage, async (page) => {
                    if (strategyPollTimer) { clearInterval(strategyPollTimer); strategyPollTimer = null; }
                    if (page === 'strategies') {
                        await loadDashboardData();
                        strategyPollTimer = setInterval(() => { loadDashboardData().catch(() => {}); }, 5 * 60 * 1000);
                    } else if (page === 'calendar') {
                        if (selectedDate.value) await loadConsensusData();
                    } else if (page === 'ai') {
                        await loadAiHistory();
                    } else if (page === 'system') {
                        if (!selectedDate.value) { const res = await fetch('/api/dashboard'); const d = await res.json(); const data = d.data || d; if (data.latest_date) selectedDate.value = data.latest_date; }
                        if (selectedDate.value) {
                            const views = ['day', 'week', 'month', 'year'];
                            for (const v of views) { try { const res = await fetch('/api/view/' + v + '/' + selectedDate.value + '?status=all'); const d = await res.json(); strategyFilterCounts.value[v] = d.stocks || []; } catch(e) {} }
                            if (!consensus.value || consensus.value.length === 0) { consensus.value = strategyFilterCounts.value.day || []; }
                        }
                    }
                });

                // ===== 初始化 =====
                onMounted(async () => {
                    const withTimeout = (promise, ms, label) => {
                        const timer = new Promise((_, reject) => setTimeout(() => reject(new Error('timeout')), ms));
                        return Promise.race([promise, timer]).catch(e => { console.warn('[init] ' + (label || 'task') + ' failed:', e.message); });
                    };
                    const savedTheme = localStorage.getItem('quant_theme');
                    if (savedTheme) applyTheme(savedTheme);
                    fetch('/api/health').then(r => r.json()).then(d => { if (d.version) appVersion.value = d.version; }).catch(() => {});
                    const p1 = Promise.all([
                        withTimeout(fetch('/api/themes').then(r => r.json()).then(d => { themes.value = d.themes || []; }), 2000, 'themes'),
                        withTimeout(fetchMarketData(), 3000, 'marketData'),
                        withTimeout(fetchMerrillClock(), 3000, 'merrillClock'),
                    ]);
                    loadAiConfig();
                    loadAiModels();
                    await p1;
                    const savedUser = localStorage.getItem('quant_user');
                    const savedToken = localStorage.getItem('quant_token');
                    if (savedUser && savedToken) {
                        let tokenValid = false;
                        try { const verifyRes = await fetch('/api/users/me', { headers: { 'Authorization': 'Bearer ' + savedToken } }); tokenValid = verifyRes.ok; } catch (e) { tokenValid = false; }
                        if (!tokenValid) { console.warn('[init] token expired, clearing session'); localStorage.removeItem('quant_user'); localStorage.removeItem('quant_token'); }
                        else {
                            try {
                                currentUser.value = JSON.parse(savedUser);
                                applyTheme(savedTheme || currentUser.value.theme || 'tech-blue');
                                await withTimeout(loadUserConfig(), 2000, 'userConfig');
                                loadAutoEvaluateConfig().catch(() => {});
                                loadGroupConfig().catch(() => {});
                                await withTimeout(loadDates(), 2000, 'dates');
                                if (currentPage.value === 'strategies') { await withTimeout(loadDashboardData(), 2000, 'dashboard'); }
                                else { await withTimeout(loadConsensusData(), 2000, 'consensus'); }
                                await withTimeout(loadUsers(), 2000, 'users');
                                loadAllGroups().catch(() => {});
                                await withTimeout(loadAiHistory(), 2000, 'aiHistory');
                            } catch (e) { console.warn('[init] user data load failed:', e.message); }
                        }
                    }
                    console.log('[DEBUG] onMounted complete');
                });

                let merrillRefreshTimer;
                let strategyPollTimer;
                const savedConfig = localStorage.getItem('merrill_clock_config');
                if (savedConfig) { try { const cfg = JSON.parse(savedConfig); merrillClockConfig.value = { ...merrillClockConfig.value, ...cfg }; } catch(e) {} }
                if (merrillClockConfig.value.autoRefresh) { merrillRefreshTimer = setInterval(() => { console.log('[美林时钟] 定时刷新...'); fetchMerrillClock(); }, merrillClockConfig.value.refreshInterval * 1000); }
                onUnmounted(() => { if (merrillRefreshTimer) clearInterval(merrillRefreshTimer); if (strategyPollTimer) clearInterval(strategyPollTimer); });

                watch(currentPage, async (val) => {
                    if (val === 'system' && currentUser.value?.role === 'admin') {
                        await loadUsers(); await loadFeishuConfig(); await loadTushareConfig();
                        await loadSystemStatus(); await loadAiConfig(); await loadRateLimit();
                        checkTushareConnection();
                        if (!window._tushareCheckTimer) { window._tushareCheckTimer = setInterval(checkTushareConnection, 3600000); }
                    }
                });

                watch([currentPage, currentSubPage], ([page, sub]) => {
                    if (!sub && menus.value.find(m => m.key === page)) { const menu = menus.value.find(m => m.key === page); if (menu && menu.subPages.length > 0) { currentSubPage.value = menu.subPages[0]; } }
                    if (page === 'calendar' && ['daily','weekly','monthly','yearly'].includes(sub)) {
                        const viewMap = { daily: 'day', weekly: 'week', monthly: 'month', yearly: 'year' };
                        if (viewMap[sub] && currentView.value !== viewMap[sub]) { currentView.value = viewMap[sub]; if (dates.value.length > 0) { selectedDate.value = dates.value[dates.value.length - 1] || ''; } setTimeout(loadConsensusData, 50); }
                    }
                    if (page === 'calendar' && sub === 'pool') { if (!consensus.value || consensus.value.length === 0) { if (dates.value.length > 0 && !selectedDate.value) { selectedDate.value = dates.value[dates.value.length - 1] || ''; } setTimeout(loadConsensusData, 50); } }
                    if (page === 'strategies') { if (sub === 'merrill') fetchMerrillClock(); if (sub === 'market') fetchMarketData(); if (sub === 'consensus') { if (!consensus.value || consensus.value.length === 0) { setTimeout(loadConsensusData, 50); } } }
                    if (page === 'ai') { if (sub === 'watchlist') { loadWatchlist(); loadAiHistory(); setTimeout(preloadWatchlistKline, 500); } if (sub === 'history') loadAiHistory(); if (sub === 'overview') { loadAiHistory(); loadWatchlist(); } }
                    if (page === 'system' && currentUser.value?.role === 'admin') {
                        if (sub === 'status') { loadSystemStatus(); checkTushareConnection(); }
                        if (sub === 'autoeval') loadAutoEvaluateConfig();
                        if (sub === 'datasource') loadDatasourceConfig();
                        if (sub === 'feature') { loadFeishuConfig(); loadAiConfig(); loadRateLimit(); loadDataRefreshConfig(); }
                        if (sub === 'user') { loadAllGroups(); loadUsers(); }
                    }
                });

                watch(showMerrillDetail, (val) => { if (!val) { document.documentElement.style.overflow = ''; document.body.style.overflow = ''; } });

                return {
                    marketData, merrillData, feishuConfig, feishuTestStatus, feishuTestMessage,
                    fetchMarketData, fetchMerrillClock, testFeishuWebhook, saveFeishuConfig,
                    merrillClockConfig, merrillClockLastUpdated, merrillReevalResult, merrillReevalLoading,
                    saveMerrillClockConfig, doMerrillReevaluate,
                    dataRefreshConfig, dataRefreshReloading, dataRefreshSaving,
                    loadDataRefreshConfig, saveDataRefreshConfig, triggerDataReload,
                    indexDetailVisible, indexDetail, indexAiResult, indexAiLoading, loadCachedIndexEval,
                    showIndexDetail, doIndexAiEvaluate,
                    klinePeriods, currentKlinePeriod, klineLoading, indexKlineLoading, stockKlineLoaded, indexKlineLoaded,
                    loadStockKline, switchKlinePeriod, loadIndexKline, switchIndexKlinePeriod, zoomKlineRange,
                    scoreAnimating, scoreDelta, scorePulse, refreshStockScore, animateScoreEntrance,
                    showMerrillDetail, merrillDetailData, showStageDetail, getCharLabel, getAssetName, getRankColor,
                    timelineStages, getStageAngle, getCycleProgress, getCurrentStageMonths, getStageTotalMonths, isStageCompleted,
                    stages, indicatorList, dimensionScoreList, confidenceColor,
                    menus, currentPage,
                    views, currentView, statusFilter,
                    currentUser, loginForm, logining, guestLogining,
                    themes, currentTheme,
                    dashboardData,
                    loading, loadingView, dates, selectedDate, lastLoadTime, consensus, searchKeyword,
                    stockDetailVisible, stockDetailTab, stockDetail,
                    aiLoading, aiEvalStage, showBatchEvaluate, batchStocks, batchRunning, batchTotal, batchCompleted, batchCurrent, batchStatuses, batchResults, aiConfig,
                    userList, showAddUser, editingUser, userForm, savingUser,
                    userSearch, filteredUsers, groupFilter, userPageTab, expandedGroups, addMemberGroupMap,
                    toggleGroupExpand, removeMemberFromGroupInline, addMemberToGroupInline, changeUserGroup,
                    statusCounts, stockPool, aiResult, aiHistory, groupedByDate, groupedByMonth, expandedDates,
