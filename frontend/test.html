<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Vue 测试</title></head>
<body>
<div id="app">
  <h1>{{ msg }}</h1>
  <p>x + 1 = {{ x + 1 }}</p>
  <p v-for="(item, idx) in items" :key="item">{{ idx + 1 }}: {{ item }}</p>
</div>
<script src="/static/lib/vue.global.prod.min.js"></script>
<script>
const { createApp, ref } = Vue;
createApp({
  setup() {
    return {
      msg: ref('如果看到这个，Vue 正常加载了'),
      x: ref(42),
      items: ['A', 'B', 'C']
    };
  }
}).mount('#app');
</script>
</body>
</html>
