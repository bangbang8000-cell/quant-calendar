<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Vue 测试</title></head>
<body>
<div id="app">
  <h1>{{ msg }}</h1>
  <p>x + 1 = {{ x + 1 }}</p>
  <div v-for="(item, idx) in items" :key="item" class="consensus-item">
    <div class="consensus-badge">{{ idx + 1 }}</div>
    <div class="consensus-info">
      <div class="consensus-code">{{ item.code }}</div>
      <div class="consensus-name">{{ item.name }}</div>
    </div>
    <div class="consensus-tags">
      <span v-for="s in item.strategies.slice(0, 2)" :key="s" class="strategy-tag">{{ s }}</span>
    </div>
  </div>
</div>
<script src="/static/lib/vue.global.prod.min.js"></script>
<script>
const { createApp, ref, computed } = Vue;
createApp({
  setup() {
    const msg = ref('Vue 测试正常');
    const items = ref([
      { code: '000333.SZ', name: '美的集团', strategies: ['多因子策略'] },
      { code: '600941.SH', name: '中国移动', strategies: ['多因子策略', '行业轮动策略'] },
    ]);
    return { msg, items };
  }
}).mount('#app');
</script>
</body>
</html>
