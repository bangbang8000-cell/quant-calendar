# 量化选股日历 Docker Compose 配置
# 启动: cd ~/.openclaw/workspace && docker compose -f quant-calendar-ops/docker-compose.yml up -d
# 查看日志: docker compose -f quant-calendar-ops/docker-compose.yml logs -f
# 停止: docker compose -f quant-calendar-ops/docker-compose.yml down

version: "3.8"

services:
  quant-calendar:
    build:
      context: .
      dockerfile: quant-calendar-ops/Dockerfile
    image: quant-calendar:2.1.2
    container_name: quant-calendar
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - QUANT_DATA_DIR=/data/qresult
      - HOST=0.0.0.0
      - PORT=8000
    volumes:
      # 持久化数据（用户、配置、缓存）
      - quant_data:/app/data
      # 策略 CSV 数据（可选覆盖内置数据）
      # - ./my_qresult:/data/qresult:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  quant_data:
    name: quant-calendar-data
